<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Change Your Password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Font -->
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="src/change_password.css" />
</head>
<body>

  <!-- NAVBAR -->
  <header>
    <nav>
      <div class="logo">
        <img src="images/CommUnity Logo.png" alt="CommUnity Logo" />
        <span class="logo-text">CommUnity</span>
      </div>

      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#features">Features</a></li>
        <li><a href="#contact">Contact</a></li>
        <li><a href="#get-started" class="get-started">Get Started</a></li>
      </ul>
    </nav>
  </header>

<main class="hero">

    <!-- PASSWORD CARD ONLY -->
    <div class="password-card">
      <h2>Change Your Password</h2>

      <p class="subtitle">
        No worries! Enter your registered email or phone number and we'll send you a reset code.
      </p>

      <form>
        <label>New Password</label>
        <input type="password" placeholder="Enter New Password" />
        <small>Password must be at least 8 characters</small>

        <label>Confirm Password</label>
        <input type="password" placeholder="Confirm Password" />

        <button type="submit">CHANGE PASSWORD</button>
      </form>
    </div>

  </main>

</body>
</html>
