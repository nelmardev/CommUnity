<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password | CommUnity</title>
  <link rel="stylesheet" href="src/forgot_password.css" />
</head>
<body>

  <header>
    <nav>
      <div class="logo">
        <img src="images/CommUnity Logo.png" alt="CommUnity Logo" />
        <span class="logo-text">CommUnity</span>
      </div>

      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#features">Features</a></li>
        <li><a href="#contact">Contact</a></li>
        <li><a href="#get-started" class="get-started">Get Started</a></li>
      </ul>
    </nav>
  </header>

  <!-- MAIN -->
  <main class="container">
    <div class="card">

      <h1>Forgot Password?</h1>
      <p class="subtitle">
        No worries! Enter your registered email or phone number
        and we'll send you a reset code.
      </p>

      <input
        type="text"
        placeholder="Email or Phone Number"
        class="input"
      />

      <button class="btn-primary" onclick="window.location.href='reset_code.html'">GET RESET CODE</button>

      <p class="footer-text">
        Remember Password?
        <a href="login.html">Log In</a>
      </p>

    </div>
  </main>

</body>
</html>
